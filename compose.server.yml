name: bedtime-story-tracker

services:
  api:
    image: bedtime-story-tracker-api:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: src/BedtimeStoryTracker.Api/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION}
        BUILD_NUMBER: ${BUILD_NUMBER}
        GIT_SHA: ${GIT_SHA}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        OCI_SOURCE: ${OCI_SOURCE:-unknown}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__ApplicationDatabase: ${ConnectionStrings__ApplicationDatabase:?Set the SQL Server connection string}
      FrontendOrigin: ${FRONTEND_ORIGIN:?Set FRONTEND_ORIGIN}
      BuildMetadata__Version: ${APP_VERSION}
      BuildMetadata__Build: ${BUILD_NUMBER}
      BuildMetadata__GitSha: ${GIT_SHA}
      BuildMetadata__GitDirty: "false"
      BuildMetadata__BuiltAtUtc: ${BUILD_DATE}
      BuildMetadata__Environment: Server
    ports:
      - "${SERVER_BIND_ADDRESS:?Set SERVER_BIND_ADDRESS}:${API_PORT:?Set API_PORT}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - server

  frontend:
    image: bedtime-story-tracker-web:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:?Set the browser-visible API URL}
        APP_VERSION: ${APP_VERSION}
        BUILD_NUMBER: ${BUILD_NUMBER}
        GIT_SHA: ${GIT_SHA}
        GIT_DIRTY: "false"
        BUILD_DATE: ${BUILD_DATE:-unknown}
        BUILD_ENVIRONMENT: Server
        OCI_SOURCE: ${OCI_SOURCE:-unknown}
    ports:
      - "${SERVER_BIND_ADDRESS:?Set SERVER_BIND_ADDRESS}:${FRONTEND_PORT:?Set FRONTEND_PORT}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - server

networks:
  server:
    name: bedtime-story-tracker-server
